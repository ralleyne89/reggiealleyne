<svg width="1440" height="810" viewBox="0 0 1440 810" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Litmus AI assessment user flow</title>
  <desc id="desc">Flow from readiness assessment entry through level calibration, questions, score review, recommendations, training, certification, billing, and dashboard review.</desc>
  <rect width="1440" height="810" fill="#10131F"/>
  <rect x="44" y="42" width="1352" height="726" rx="34" fill="#F8FAFC"/>
  <text x="104" y="124" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Readiness assessment to learning path</text>
  <text x="104" y="162" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">A short test becomes useful when every score points to a next decision.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <path d="M180 334H1248" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
  <g stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M265 334H404"/>
    <path d="M504 334H644"/>
    <path d="M744 334H884"/>
    <path d="M984 334H1124"/>
    <path d="M942 420V536H726"/>
    <path d="M942 420V536H1058"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="180" cy="334" r="54" fill="#111827"/>
    <text x="180" y="326" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Start</text>
    <text x="180" y="349" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="13">assessment</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="382" y="276" width="144" height="116" rx="20" fill="#F3F0FF" stroke="#C4B5FD" stroke-width="2"/>
    <text x="454" y="318" text-anchor="middle" fill="#4C1D95" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Calibrate</text>
    <text x="454" y="346" text-anchor="middle" fill="#6D5A98" font-family="Inter, Arial, sans-serif" font-size="14">beginner</text>
    <text x="454" y="368" text-anchor="middle" fill="#6D5A98" font-family="Inter, Arial, sans-serif" font-size="14">or advanced</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="624" y="276" width="144" height="116" rx="20" fill="#FFFFFF" stroke="#DCE3EE" stroke-width="2"/>
    <text x="696" y="318" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Answer</text>
    <text x="696" y="346" text-anchor="middle" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="14">15 practical</text>
    <text x="696" y="368" text-anchor="middle" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="14">questions</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="864" y="276" width="144" height="116" rx="20" fill="#EEFDF6" stroke="#A7F3D0" stroke-width="2"/>
    <text x="936" y="318" text-anchor="middle" fill="#065F46" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Review</text>
    <text x="936" y="346" text-anchor="middle" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="14">score and</text>
    <text x="936" y="368" text-anchor="middle" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="14">domain gaps</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="1184" cy="334" r="64" fill="#111827"/>
    <text x="1184" y="326" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Choose</text>
    <text x="1184" y="350" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="13">next path</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="522" y="536" width="204" height="106" rx="22" fill="#FFFFFF" stroke="#DCE3EE" stroke-width="2"/>
    <text x="548" y="578" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Training path</text>
    <text x="548" y="606" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="14">Recommended modules</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="814" y="536" width="204" height="106" rx="22" fill="#FFFFFF" stroke="#DCE3EE" stroke-width="2"/>
    <text x="840" y="578" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Certification</text>
    <text x="840" y="606" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="14">Credential readiness</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1090" y="536" width="204" height="106" rx="22" fill="#111827"/>
    <text x="1116" y="578" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Billing</text>
    <text x="1116" y="606" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14">Free, Premium, Team</text>
  </g>

  <path d="M1018 589H1090" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M726 589H814" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="104" y="688" width="554" height="42" rx="21" fill="#FFFFFF" stroke="#DCE3EE"/>
  <circle cx="130" cy="709" r="7" fill="#7C3AED"/>
  <text x="152" y="716" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">The business handoff happens after the learner understands their gap.</text>
</svg>
