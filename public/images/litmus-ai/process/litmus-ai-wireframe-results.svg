<svg width="1080" height="810" viewBox="0 0 1080 810" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Litmus AI results wireframe</title>
  <desc id="desc">Low-fidelity results screen with readiness score, domain breakdown, recommended modules, certification path, and dashboard action.</desc>
  <rect width="1080" height="810" fill="#10131F"/>
  <rect x="44" y="42" width="992" height="726" rx="34" fill="#F8FAFC"/>
  <rect x="78" y="78" width="924" height="654" rx="28" fill="#FFFFFF" stroke="#DCE3EE" stroke-width="2"/>
  <text x="112" y="132" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Results and recommendations wireframe</text>
  <text x="112" y="166" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="17">Turn a score into a decision surface.</text>

  <rect x="112" y="216" width="332" height="458" rx="22" fill="#111827"/>
  <text x="144" y="264" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Readiness score</text>
  <text x="144" y="336" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900">74</text>
  <text x="248" y="334" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">/ 100</text>
  <text x="144" y="382" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Ready to train</text>
  <text x="144" y="416" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Strong basics, but prompting and ethics need targeted practice.</text>
  <rect x="144" y="476" width="238" height="54" rx="27" fill="#7C3AED"/>
  <text x="199" y="510" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Start training path</text>
  <rect x="144" y="548" width="238" height="54" rx="27" fill="#FFFFFF" fill-opacity="0.08" stroke="#334155"/>
  <text x="202" y="582" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Save to dashboard</text>

  <rect x="486" y="216" width="450" height="196" rx="22" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="520" y="260" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Domain breakdown</text>
  <text x="520" y="300" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="14">AI concepts</text>
  <rect x="642" y="288" width="248" height="12" rx="6" fill="#E2E8F0"/>
  <rect x="642" y="288" width="198" height="12" rx="6" fill="#22C55E"/>
  <text x="520" y="334" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="14">Prompting</text>
  <rect x="642" y="322" width="248" height="12" rx="6" fill="#E2E8F0"/>
  <rect x="642" y="322" width="148" height="12" rx="6" fill="#7C3AED"/>
  <text x="520" y="368" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="14">Ethics</text>
  <rect x="642" y="356" width="248" height="12" rx="6" fill="#E2E8F0"/>
  <rect x="642" y="356" width="126" height="12" rx="6" fill="#F59E0B"/>

  <rect x="486" y="446" width="214" height="228" rx="22" fill="#FFFFFF" stroke="#DCE3EE" stroke-width="2"/>
  <text x="520" y="488" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Recommended modules</text>
  <rect x="520" y="522" width="146" height="12" rx="6" fill="#CBD5E1"/>
  <rect x="520" y="554" width="122" height="12" rx="6" fill="#E2E8F0"/>
  <rect x="520" y="586" width="156" height="12" rx="6" fill="#E2E8F0"/>
  <rect x="520" y="626" width="116" height="34" rx="17" fill="#EEF2FF"/>
  <text x="544" y="648" fill="#4C1D95" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Open path</text>

  <rect x="724" y="446" width="212" height="228" rx="22" fill="#FFFFFF" stroke="#DCE3EE" stroke-width="2"/>
  <text x="758" y="488" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Certification</text>
  <circle cx="796" cy="548" r="34" fill="#EEFDF6" stroke="#A7F3D0" stroke-width="2"/>
  <path d="M780 548L792 560L814 532" stroke="#059669" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="758" y="616" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="14">Unlock exam when the learning path is ready.</text>

  <rect x="112" y="700" width="514" height="1" fill="#DCE3EE"/>
  <text x="112" y="726" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="14">UX note: the result is not just feedback. It is the bridge into training, certificate, and account value.</text>
</svg>
