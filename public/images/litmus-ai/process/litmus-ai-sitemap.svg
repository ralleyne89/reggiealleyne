    <text x="136" y="256" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Home</text>
    <text x="136" y="282" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14">Promise and entry</text>
  </g>

