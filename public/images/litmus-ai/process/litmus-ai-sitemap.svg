    <path d="M666 262H844"/>
    <path d="M1016 262V372"/>
    <path d="M1016 514V590"/>
    <path d="M580 340V452"/>
    <path d="M580 580V638"/>
    <path d="M844 452H700"/>
    <path d="M494 452H350"/>
  </g>

