<svg width="1440" height="810" viewBox="0 0 1440 810" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Litmus AI sitemap</title>
  <desc id="desc">Product map connecting home, assessment, results, training, certification, billing, dashboard, profile, login, and registration routes.</desc>
  <rect width="1440" height="810" fill="#10131F"/>
  <rect x="44" y="42" width="1352" height="726" rx="34" fill="#F8FAFC"/>
  <rect x="72" y="70" width="1296" height="670" rx="24" fill="#FFFFFF" stroke="#DCE3EE" stroke-width="2"/>
  <text x="112" y="128" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Assess, Activate, Certify sitemap</text>
  <text x="112" y="166" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">The free readiness check stays connected to learning, credentials, team review, and billing.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <g stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
