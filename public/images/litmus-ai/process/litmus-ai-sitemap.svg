  <path d="M1120 634H1168" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="112" y="654" width="242" height="38" rx="19" fill="#F8FAFC" stroke="#DCE3EE"/>
  <circle cx="134" cy="673" r="6" fill="#7C3AED"/>
  <text x="152" y="679" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">Assessment is the acquisition loop.</text>
